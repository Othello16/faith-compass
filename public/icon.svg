<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0F172A"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#D4AF37" stroke-width="12"/>
  <!-- Cardinal marks -->
  <text x="256" y="108" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#D4AF37">N</text>
  <text x="256" y="430" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#ffffff" opacity="0.6">S</text>
  <text x="404" y="272" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#ffffff" opacity="0.6">E</text>
  <text x="108" y="272" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#ffffff" opacity="0.6">W</text>
  <!-- Needle north (gold) -->
  <polygon points="256,140 244,260 256,270 268,260" fill="#D4AF37"/>
  <!-- Needle south (white) -->
  <polygon points="256,372 244,260 256,250 268,260" fill="#ffffff" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="256" cy="260" r="14" fill="#1E40AF"/>
  <circle cx="256" cy="260" r="7" fill="#D4AF37"/>
  <!-- Jupiter symbol -->
  <text x="256" y="490" text-anchor="middle" font-family="serif" font-size="28" fill="#D4AF37" opacity="0.5">♃</text>
</svg>
